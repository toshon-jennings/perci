<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer Rounded Background (Dark Charcoal/Graphite) -->
  <rect width="64" height="64" rx="14" fill="#0b0f19"/>

  <!-- Scaffolding Back Grid Lines (Subtle industrial details behind the board) -->
  <line x1="12" y1="40" x2="52" y2="40" stroke="#1f2937" stroke-width="1"/>
  <line x1="32" y1="40" x2="32" y2="54" stroke="#1f2937" stroke-width="1.5"/>

  <!-- Supporting Pillar/Legs -->
  <rect x="23" y="38" width="4" height="16" fill="#374151"/>
  <rect x="37" y="38" width="4" height="16" fill="#374151"/>
  <rect x="18" y="52" width="28" height="4" rx="1.5" fill="#4b5563"/>

  <!-- Billboard Display Face Outer Border (Burnished steel frame) -->
  <rect x="8" y="10" width="48" height="30" rx="5" fill="#1f2937" stroke="#374151" stroke-width="2"/>
  
  <!-- Billboard Screen Display (Deep green-black obsidian glass) -->
  <rect x="10" y="12" width="44" height="26" rx="3" fill="#06120e"/>

  <!-- Financial Chart Bars on the Billboard screen (No purple! Deep green, emerald, mint) -->
  <!-- Bar 1 (Green) -->
  <rect x="14" y="26" width="5" height="10" rx="1" fill="#047857"/>
  <!-- Bar 2 (Emerald) -->
  <rect x="21" y="20" width="5" height="16" rx="1" fill="#10b981"/>
  <!-- Bar 3 (Mint) -->
  <rect x="28" y="16" width="5" height="20" rx="1" fill="#34d399"/>
  
  <!-- Glowing Dollar Sign '$' on the right side of the screen (Neon green) -->
  <path d="M42,20.5 C40,20.5 39,21.5 39,22.5 C39,24 43,24.5 43,26 C43,27 42,28 40,28" stroke="#34d399" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M41,18 L41,30.5" stroke="#34d399" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Billboard Overhead Spotlight Lamp Brackets -->
  <path d="M22,10 L22,6 C22,5.5 22.5,5 23,5" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M42,10 L42,6 C42,5.5 41.5,5 41,5" stroke="#4b5563" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  
  <!-- Little Overhead Lamp Heads -->
  <rect x="20" y="4" width="6" height="2.5" rx="0.8" fill="#6b7280"/>
  <rect x="38" y="4" width="6" height="2.5" rx="0.8" fill="#6b7280"/>
  
  <!-- Subtle Glowing Light Cones emanating from the lamps (Semi-transparent emerald glow) -->
  <polygon points="23,6.5 12,24 34,24" fill="url(#lamp-glow)"/>
  <polygon points="41,6.5 30,24 52,24" fill="url(#lamp-glow)"/>

  <!-- Gradients definitions -->
  <defs>
    <linearGradient id="lamp-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
