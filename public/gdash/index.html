<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G-Dash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/gdash-logo.png">
    <link rel="apple-touch-icon" href="assets/gdash-logo.png">
</head>

<body>
    <div class="dashboard-wrapper">
        <div class="sticky-header-container">
            <header class="main-header">
                <div class="logo-area">
                    <div class="google-logo">
                        <img src="assets/gdash-logo.png" alt="G-Dash Logo" class="header-logo">
                    </div>
                    <h1><span class="g-blue">G</span>-<span class="accent"><span class="g-red">D</span><span
                                class="g-yellow">a</span><span class="g-green">s</span><span
                                class="g-blue">h</span></span>
                    </h1>
                </div>

                <div class="search-bar">
                    <div class="search-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <input type="text" id="service-search" placeholder="Search Google ecosystem...">
                    <div class="search-shortcut">/</div>
                </div>

                <div class="user-area">
                    <button id="auth-btn" class="auth-btn">
                        <span class="auth-icon">G</span>
                        <span class="auth-text">Sign In</span>
                    </button>
                </div>
            </header>

            <!-- Category Filter Pills -->
            <nav class="category-filters" id="category-filters">
                <!-- Pills will be dynamically generated by JavaScript -->
            </nav>
        </div>

        <main class="dashboard-grid" id="dashboard-grid">
            <!-- Dynamic Cards Here -->
        </main>

        <footer class="dashboard-footer">
            <p>&copy; 2026 Perci | G-Dash — Google Workspace Dashboard</p>
            <p class="footer-note">Note: For security, some Google services restrict embedding. These links will open in
                a new tab.</p>
        </footer>
    </div>


    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content" id="modal-content-inject">
            <!-- Dynamic Content -->
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
